<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NU-LAYER ARCHIVE</title>
<style>
  :root {
    --bg: #f5f5f7; --panel: #ffffff; --panel-alt: #f5f5f7; --border: #d2d2d7; --ink: #1d1d1f; --ink-dim: #86868b;
    --font-mono: ui-monospace, SFMono-Regular, monospace;
    --aa-blur: 0px; --aa-render: pixelated; /* AA Variables */
  }
  html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, sans-serif; overflow: hidden; height: 100%; }
  
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; display: flex; justify-content: space-between; padding: 18px 26px; pointer-events: none; }
  .topbar > * { pointer-events: auto; }
  .brand h1 { font-weight: 700; font-size: 18px; margin: 0; }
  .brand p { font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); margin: 2px 0 0; }

  .top-actions { display: flex; gap: 8px; align-items: center; }
  .btn, .chip, .aa-slider-wrap {
    font-family: var(--font-mono); font-size: 11px; padding: 8px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.8); backdrop-filter: blur(8px);
    color: var(--ink); text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--ink); color: #fff; }

  .stage { position: fixed; inset: 0; overflow: hidden; touch-action: none; }
  .collage-item { position: absolute; cursor: grab; z-index: 5; pointer-events: auto; user-select: none; }
  .collage-item.selected { z-index: 50; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1)); }
  /* Anti-aliasing CSS variables applied here */
  .collage-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; filter: blur(var(--aa-blur)); image-rendering: var(--aa-render); }

  /* Float Menu */
  .float-menu { position: absolute; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 220px; display: flex; flex-direction: column; gap: 12px; transform: translate(-50%, calc(-100% - 20px)); }
  .fm-row { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); }
  .fm-row input[type=range] { flex: 1; accent-color: var(--ink); }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(29,29,31,0.9); color: #fff; padding: 12px 20px; border-radius: 12px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<div id="floatMenu" class="float-menu" style="display:none;">
  <div style="font-size:13px; font-weight:600; text-align:center; border-bottom:1px solid var(--border); padding-bottom:8px;">ADJUST</div>
  <div class="fm-row"><span>Scale</span><input type="range" id="fmScale" min="0.2" max="4" step="0.05"></div>
  <div class="fm-row"><span>Rotate</span><input type="range" id="fmRotate" min="-180" max="180" step="1"></div>
</div>

<div class="topbar">
  <div class="brand"><div><h1>NU-LAYER / ARCHIVE</h1><p>Right-click to save PNG</p></div></div>
  <div class="top-actions">
    <div class="aa-slider-wrap">
      <span>AA</span><input type="range" id="aaSlider" min="0" max="10" value="0" style="width:60px;">
    </div>
    <div class="chip" id="statChip">LOADING...</div>
    <button class="btn" onclick="location.reload()">↻ REFRESH</button>
    <a class="btn" href="index.html">← STUDIO</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const $ = id => document.getElementById(id);
  const rand = (a, b) => a + Math.random() * (b - a);
  function toast(msg){ const el = $('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(()=> el.classList.remove('show'), 2000); }

  // Anti-aliasing slider logic
  $('aaSlider').addEventListener('input', e => {
    const val = parseInt(e.target.value);
    document.documentElement.style.setProperty('--aa-blur', val > 0 ? `${val * 0.1}px` : '0px');
    document.documentElement.style.setProperty('--aa-render', val > 0 ? 'auto' : 'pixelated');
  });

  const GH_STORAGE_KEY = 'objet_studio_gh_config';
  let ghConfig = null;
  try { ghConfig = JSON.parse(localStorage.getItem(GH_STORAGE_KEY)); } catch(e){}

  async function loadImages(){
    if(!ghConfig) return toast('Connect GitHub in Studio first.');
    const res = await fetch(`https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}?ref=${ghConfig.branch}`, {
      headers: { 'Authorization': `Bearer ${ghConfig.token}` }
    });
    const data = await res.json();
    if(!Array.isArray(data)) return;
    
    // Fetch all folders
    const files = [];
    for(const d of data) {
      if(d.type === 'dir') {
        const sub = await fetch(`https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${d.path}?ref=${ghConfig.branch}`, { headers: { 'Authorization': `Bearer ${ghConfig.token}` }});
        const subData = await sub.json();
        subData.forEach(f => { if(f.name.endsWith('.png')) files.push(f); });
      }
    }
    
    $('statChip').textContent = `${files.length} ITEMS`;
    placeCollage(files);
  }

  let activeItemObj = null;
  const stage = $('stage'); const floatMenu = $('floatMenu');

  function placeCollage(files) {
    files.forEach((f, i) => {
      const size = rand(100, 300);
      const el = document.createElement('div'); el.className = 'collage-item';
      const obj = { el, x: rand(0, window.innerWidth-size), y: rand(0, window.innerHeight-size), scale: 1, rotate: rand(-20,20), w:size };
      
      el.style.width = size+'px'; el.style.height = size+'px';
      el.style.transform = `translate(${obj.x}px, ${obj.y}px) rotate(${obj.rotate}deg) scale(${obj.scale})`;
      
      const img = document.createElement('img'); img.src = f.download_url;
      el.appendChild(img); stage.appendChild(el);

      // Right Click to Save
      el.addEventListener('contextmenu', async e => {
        e.preventDefault(); toast('Downloading...');
        try {
          const res = await fetch(f.download_url); const blob = await res.blob();
          const url = URL.createObjectURL(blob); const a = document.createElement('a');
          a.href = url; a.download = f.name; a.click(); URL.revokeObjectURL(url);
        } catch(err){ toast('Download Failed'); }
      });

      // Drag & Select
      el.addEventListener('pointerdown', e => {
        if(e.button !== 0) return; // ignore right click for drag
        e.preventDefault();
        if(activeItemObj) activeItemObj.el.classList.remove('selected');
        activeItemObj = obj; el.classList.add('selected'); el.style.zIndex = 100;
        
        $('fmScale').value = obj.scale; $('fmRotate').value = obj.rotate;
        floatMenu.style.display = 'flex'; floatMenu.style.left = obj.x + (obj.w/2) + 'px'; floatMenu.style.top = obj.y + 'px';

        let sx=e.clientX, sy=e.clientY, ix=obj.x, iy=obj.y;
        function move(me){ obj.x = ix+(me.clientX-sx); obj.y = iy+(me.clientY-sy); el.style.transform = `translate(${obj.x}px, ${obj.y}px) rotate(${obj.rotate}deg) scale(${obj.scale})`; floatMenu.style.left = obj.x + (obj.w/2) + 'px'; floatMenu.style.top = obj.y + 'px'; }
        function up(){ window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); }
        window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
      });
    });
  }

  $('fmScale').addEventListener('input', e => { if(activeItemObj){ activeItemObj.scale = e.target.value; activeItemObj.el.style.transform = `translate(${activeItemObj.x}px, ${activeItemObj.y}px) rotate(${activeItemObj.rotate}deg) scale(${activeItemObj.scale})`; }});
  $('fmRotate').addEventListener('input', e => { if(activeItemObj){ activeItemObj.rotate = e.target.value; activeItemObj.el.style.transform = `translate(${activeItemObj.x}px, ${activeItemObj.y}px) rotate(${activeItemObj.rotate}deg) scale(${activeItemObj.scale})`; }});

  stage.addEventListener('pointerdown', e => { if(e.target === stage) { floatMenu.style.display = 'none'; if(activeItemObj) activeItemObj.el.classList.remove('selected'); activeItemObj=null; }});

  loadImages();
})();
</script>
</body>
</html>
